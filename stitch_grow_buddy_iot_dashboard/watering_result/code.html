            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            box-shadow: 0 4px 20px 0 rgba(136, 192, 112, 0.15);

      min-height: max(884px, 100dvh);

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation (Shell Supressed for Transactional Result) -->
<header class="flex justify-between items-center px-6 py-4 w-full z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A friendly illustrated user avatar profile picture of a young gardener character with a small green sprout on their hat. The artwork is clean, digital, and professional with a soft pastel green background. The style is high-quality 3D claymorphism with soft studio lighting and vibrant saturated colors consistent with a modern mobile app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWKw9W6iI8tYXhCTxyllffk_TH-OxDTHuUNArjpZiboAGZh0dCMCUU9JZJkOElZjhQ06EVwWQ1F0PmbnkjubFlOiPQdz2vBzxj3UyrgUY_2E3Su8BuvBgJWmiT3cYM9CotmZS-_FPJDNNUSP4fERuEwN8YVGRiAD_P6Ba1tg0K6Hip70zcXw0OPGJfH1ynwFJrigKoDssEEmd_Whbrg10HZlCLCOjwgxuwFOH69JMNio3Fr0jZn_Za0RM0kdca7KgOEI3cY0EHr5M"/>
</div>
<span class="font-h2 text-body-md text-primary">Level 12</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/80 squishy-shadow">
<span class="material-symbols-outlined text-primary">close</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center px-container-padding pt-base pb-xl">
<!-- Success Celebration Section -->
<div class="w-full flex flex-col items-center text-center space-y-md">
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Sun Rays / Glow Backdrop -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-3xl scale-110"></div>
<!-- Happy Plant Character -->
<img class="relative z-10 w-48 h-48 drop-shadow-2xl" data-alt="A joyful and adorable 3D character of a succulent plant in a white ceramic pot, featuring a big happy smile and sparkling eyes. The plant character has vibrant green leaves and is surrounded by small floating sparkles and musical notes. The lighting is bright and cheerful with soft, warm yellow and green tones, presented in a high-fidelity 3D claymorphism style against a soft cream background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWi7FllaNmbrdUWLDsolbaDQ1aWd8d9ocMYmlNyuUq3Vkr00HcJKkhvnArqCKx-gPO-u1RBRfsXVb9L8BswVuy3XNW8Ofe1lLE1rQI9Mp63wCEMyENhtVSfC3oN41DowXswc5nFmnHO4T0kmRyjmIWDTSL_L9wcMEEkyR8HHKjUuMzXz4QJsK3dgBsmi9KeziztL7X9LacV6s2iWioRjjyMEQVW42pNF4wObc4Ili75wjq8U2b7O9FvYUGlDB0VpKRWQtJaQOwLes"/>
<!-- Confetti/Points Badge -->
<div class="absolute -top-2 -right-2 bg-tertiary-fixed text-on-tertiary-fixed font-h2 px-4 py-2 rounded-full flex items-center gap-1 shadow-lg transform rotate-12">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-button">+10 poin</span>
</div>
</div>
<div class="space-y-xs">
<h1 class="font-h1 text-h1 text-primary tracking-tight">Berhasil!</h1>
<p class="font-body-lg text-secondary font-semibold">Penyiraman tepat waktu</p>
</div>
</div>
<!-- Progress Comparison Bento Grid -->
<div class="w-full mt-xl grid grid-cols-2 gap-md">
<!-- Moisture Before -->
<div class="bg-white rounded-[32px] p-md squishy-shadow flex flex-col items-center text-center border-2 border-surface-container">
<span class="font-label-caps text-outline uppercase tracking-widest mb-xs">SEBELUM</span>
<div class="relative w-full h-24 flex items-center justify-center overflow-hidden rounded-2xl bg-surface-container-low mb-sm">
<span class="font-h1 text-h1 text-outline/50 relative z-10">35%</span>
<div class="absolute bottom-0 left-0 w-full bg-secondary-container/40" style="height: 35%;"></div>
</div>
<span class="font-body-md text-outline">Tanaman Haus</span>
</div>
<!-- Moisture After -->
<div class="bg-primary-fixed rounded-[32px] p-md squishy-shadow flex flex-col items-center text-center border-2 border-primary-container">
<span class="font-label-caps text-on-primary-fixed-variant uppercase tracking-widest mb-xs">SESUDAH</span>
<div class="relative w-full h-24 flex items-center justify-center overflow-hidden rounded-2xl bg-white/50 mb-sm">
<span class="font-h1 text-h1 text-primary relative z-10">62%</span>
<div class="absolute bottom-0 left-0 w-full bg-primary-container" style="height: 62%;"></div>
</div>
<span class="font-body-md text-on-primary-fixed-variant font-bold">Wah, segar sekali!</span>
</div>
</div>
<!-- Feedback Card -->
<div class="w-full mt-gutter bg-secondary-fixed/30 rounded-[32px] p-lg flex items-start gap-4 border border-secondary-fixed/50">
<div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div>
<h3 class="font-h2 text-button text-secondary">Hidrasi Optimal</h3>
<p class="font-body-md text-on-secondary-container">Tanamanmu sekarang memiliki kelembapan yang cukup untuk tumbuh sehat hari ini.</p>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full mt-auto pt-xl space-y-md">
<button class="w-full bg-primary text-white font-button text-button py-5 rounded-full squishy-shadow flex items-center justify-center gap-2 active:scale-95 transition-transform duration-200">
                Kembali
            </button>
<button class="w-full bg-transparent text-secondary font-button text-button py-5 rounded-full flex items-center justify-center gap-2 hover:bg-secondary/5 transition-colors">
<span class="material-symbols-outlined">history</span>
                Lihat Riwayat
            </button>
</div>
</main>
<!-- Support Spacer for fixed elements if any -->
<div class="h-8"></div>
