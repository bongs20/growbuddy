<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GrowBuddy - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-container-highest": "#e8e3cd",
                        "outline-variant": "#c2c9b9",
                        "on-tertiary-fixed-variant": "#574500",
                        "inverse-primary": "#9cd683",
                        "surface-dim": "#e0dac5",
                        "on-surface": "#1e1c0f",
                        "on-secondary-fixed-variant": "#0d503f",
                        "secondary-container": "#aeedd5",
                        "on-error": "#ffffff",
                        "inverse-surface": "#333122",
                        "background": "#fff9e7",
                        "surface-bright": "#fff9e7",
                        "on-secondary-fixed": "#002118",
                        "inverse-on-surface": "#f7f1db",
                        "tertiary-fixed-dim": "#e7c353",

                        "on-primary-fixed": "#042100",

                        "container-padding": "20px",
                        "xl": "32px",
                        "base": "8px",
                        "gutter": "16px",
                        "xs": "4px",
                        "sm": "12px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "button": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "button": ["16px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "h2": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .squishy-shadow {
            box-shadow: 0 4px 20px 0 rgba(136,192,112,0.08);
        }
        .bg-mesh {
            background-color: #fff9e7;
            background-image: radial-gradient(at 0% 0%, rgba(136,192,112,0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(177,239,216,0.15) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface overflow-hidden">
<!-- Main Splash Canvas -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-mesh px-container-padding">
<!-- Animated Blob Background Element (Visual Interest) -->
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary-container/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[250px] h-[250px] bg-secondary-container/30 rounded-full blur-[60px]"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Logo & Brand Header -->
<div class="mb-lg flex flex-col items-center">
<div class="w-24 h-24 mb-md rounded-[32px] bg-white flex items-center justify-center squishy-shadow">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="potted_plant" style="font-variation-settings: 'FILL' 1;">potted_plant</span>
</div>
<h1 class="font-h1 text-h1 text-primary tracking-tight">GrowBuddy</h1>
</div>
<!-- Illustration Area -->
<div class="relative mb-xl max-w-[320px] w-full aspect-square">
<div class="absolute inset-0 bg-white/40 backdrop-blur-sm rounded-[48px] border border-white/60 squishy-shadow"></div>
<div class="relative h-full w-full flex items-center justify-center p-md">
<img alt="Cute stylized plant character" class="w-full h-full object-contain rounded-[40px]" data-alt="A charming, high-quality 3D render of a stylized Monstera Deliciosa plant with friendly cartoon eyes sitting in a minimalist ceramic pot. The scene is bathed in soft, natural morning sunlight within a clean, cream-colored studio setting. The visual style is vibrant and soft, using a warm palette of emerald greens and soft mints. The overall mood is nurturing and cheerful, perfectly aligning with a modern mobile app aesthetic for plant care enthusiasts." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-qY1pE16lHOE022doGMNPg1ogNwjYGAEuJhZ3ynVdkhVj0YRjuvujBD2subBtfED4phfPDklgjugtGKmxclSlPzYhKMezEZwBP3Gk3lE07_-8JCNm7r-lmd9vWJqleYqGAEenubFHk6hmKn3tnnGkJL9ClfdxG1VuJ1cgDPjkp8ngnOgn7gEBdKQTMavuUwKhgRN_gRCVnx721sEYSP2Cpgmpymv91C6gBwOoy0Iuad48Vb4zssc2I2qGggEU8JCrB_hnyjoIKJs"/>
</div>
<!-- Floating Decorative Icons -->
<div class="absolute -top-4 -right-4 w-12 h-12 bg-tertiary-fixed rounded-2xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-on-tertiary-fixed" data-icon="water_drop" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div class="absolute bottom-8 -left-6 w-14 h-14 bg-primary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<!-- Tagline -->
<div class="space-y-sm">
<p class="font-body-lg text-body-lg text-on-surface-variant font-semibold">
                    Smart Plant Watering Game
                </p>
<div class="flex items-center justify-center gap-base">
<span class="w-2 h-2 rounded-full bg-primary/20"></span>
<span class="w-8 h-2 rounded-full bg-primary"></span>
<span class="w-2 h-2 rounded-full bg-primary/20"></span>
</div>
</div>
</div>
<!-- Progress Indicator / Loading State -->
<div class="absolute bottom-xl left-0 w-full flex flex-col items-center px-container-padding">
<div class="w-full max-w-[200px] h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-1/3 rounded-full"></div>
</div>
<p class="mt-md font-label-caps text-label-caps text-outline uppercase tracking-widest">
                Menyiapkan Kebunmu...
            </p>
</div>
<!-- Footer / Credits -->
<div class="absolute bottom-lg opacity-40">
<p class="font-label-caps text-[10px] text-on-surface-variant">Version 1.0.2 • Powered by GrowSens™</p>
</div>
</main>
</body></html>
